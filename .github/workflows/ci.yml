name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  byte-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install liberime stub
        run: |
          mkdir -p ~/.emacs.d/elpa/liberime-0.0.7
          cp test/liberime-stub.el ~/.emacs.d/elpa/liberime-0.0.7/liberime.el
          cp test/liberime-pkg.el ~/.emacs.d/elpa/liberime-0.0.7/

      - name: Byte-compile
        run: |
          emacs --batch -Q \
            -L . \
            -L ~/.emacs.d/elpa/liberime-0.0.7 \
            --eval "(setq byte-compile-error-on-warn t)" \
            -f batch-byte-compile \
            rimel.el
      - name: Install package-lint
        run: |
          emacs --batch -Q \
            --eval "(add-to-list 'package-directory-list \"~/.emacs.d/elpa\")" \
            --eval "(push \"~/.emacs.d/elpa/liberime-0.0.7\" package-directory-list)" \
            --eval "(setq package-archives '((\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(package-install 'package-lint)"

      - name: Lint
        run: |
          emacs --batch -Q \
            -L . \
            -L ~/.emacs.d/elpa/liberime-0.0.7 \
            --eval "(add-to-list 'package-directory-list \"~/.emacs.d/elpa\")" \
            --eval "(push \"~/.emacs.d/elpa/liberime-0.0.7\" package-directory-list)" \
            --eval "(package-initialize)" \
            --eval "(require 'package-lint)" \
            -f package-lint-batch-and-exit \
            rimel.el

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run tests
        run: |
          emacs --batch -Q -L . -L test \
            -l ert \
            -l test/rimel-test.el \
            -f rimel-test-run
