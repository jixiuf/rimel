name: Release

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
  workflow_dispatch:   # run manually

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: ${{ matrix.arch == 'CLANGARM64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: MINGW64
            pkg_prefix: mingw-w64-x86_64
            archive: librimel-${{ github.ref_name }}-windows-x86_64
          - arch: UCRT64
            pkg_prefix: mingw-w64-ucrt-x86_64
            archive: librimel-${{ github.ref_name }}-windows-ucrt-x86_64
          - arch: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
            archive: librimel-${{ github.ref_name }}-windows-clang-x86_64
          - arch: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            archive: librimel-${{ github.ref_name }}-windows-clang-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch }}
          update: true
          install: |
            ${{ matrix.pkg_prefix }}-gcc
            ${{ matrix.pkg_prefix }}-librime
            ${{ matrix.pkg_prefix }}-librime-data
            ${{ matrix.pkg_prefix }}-rime-wubi
            ${{ matrix.pkg_prefix }}-rime-double-pinyin
            ${{ matrix.pkg_prefix }}-rime-emoji

      - name: Build
        shell: msys2 {0}
        env:
          MSYSTEM: ${{ matrix.arch }}
        run: |
          bash tools/librimel-msys2-build.sh --archive=${{ matrix.archive }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.zip
          retention-days: 1

  build-linux:
    permissions:
      contents: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            archive: librimel-${{ github.ref_name }}-linux-x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            archive: librimel-${{ github.ref_name }}-linux-aarch64
          - arch: arm64
            runner: ubuntu-24.04-arm
            archive: librimel-${{ github.ref_name }}-linux-arm64
          - arch: armhf
            runner: ubuntu-latest
            archive: librimel-${{ github.ref_name }}-linux-armhf
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgoogle-glog-dev \
            libgflags-dev \
            libleveldb-dev \
            libmarisa-dev \
            libopencc-dev \
            libyaml-cpp-dev \
            libboost-all-dev \
            librime-dev \
            librime-data

      - name: Build
        run: |
          make clean
          make

      - name: Archive
        run: |
          ARCHIVE_NAME="${{ matrix.archive }}"
          TEMP_DIR="temp"

          mkdir -p ${TEMP_DIR}/share/emacs/site-lisp/librimel/
          cp librimel.el ${TEMP_DIR}/share/emacs/site-lisp/librimel/
          cp src/librimel-core.so ${TEMP_DIR}/share/emacs/site-lisp/librimel/

          tar -czf ${ARCHIVE_NAME}.tar.gz ${TEMP_DIR}/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}.tar.gz
          retention-days: 1

  build-linux-verify:
    needs: build-linux
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: armhf
            runner: ubuntu-latest
        emacs_version:
          - '29.4'
          - '30.1'
          - 'snapshot'
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgoogle-glog-dev \
            libgflags-dev \
            libleveldb-dev \
            libmarisa-dev \
            libopencc-dev \
            libyaml-cpp-dev \
            libboost-all-dev \
            librime-dev \
            librime-data

      - name: Build & Verify
        run: |
          make clean
          make

  release:
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-linux-verify]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f | sort

      - name: Prepare release files
        run: |
          mkdir -p release-files
          # Copy tar.gz files directly, skip zip files from Windows builds
          find artifacts/ -name "*.tar.gz" -exec cp {} release-files/ \;
          # For zip files from Windows builds, keep them as-is
          find artifacts/ -name "*.zip" -exec cp {} release-files/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
